# UART configuration
CONFIG_SERIAL=y
CONFIG_UART_CONSOLE=y
CONFIG_UART_INTERRUPT_DRIVEN=y

# Console
CONFIG_CONSOLE=y
CONFIG_PRINTK=y

# No heap — medical device requirement
CONFIG_HEAP_MEM_POOL_SIZE=0

# C++ support
CONFIG_CPP=y
CONFIG_STD_CPP20=y
CONFIG_GLIBCXX_LIBCPP=y

# I2C for LPS22HB sensor
CONFIG_I2C=y

# Stack sizes
CONFIG_MAIN_STACK_SIZE=2048
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048
CONFIG_SENSOR=y
CONFIG_QDEC_STM32=y
